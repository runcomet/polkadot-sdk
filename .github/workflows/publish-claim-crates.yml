name: Claim Crates

on:
  push:
    branches:
      - master

jobs:
  claim-crates:
    runs-on: ubuntu-latest
    environment: master
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: install parity-publish
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev pkg-config
          cargo install parity-publish@0.10.10 --locked -q

      - name: parity-publish claim
        env:
          PARITY_PUBLISH_CRATESIO_TOKEN: ${{ secrets.CRATESIO_PUBLISH_CLAIM_TOKEN }}
        run: parity-publish --color always claim
