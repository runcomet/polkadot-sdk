name: Zombienet Cumulus

on:
  workflow_call:
    inputs:
      build_run_id:
        type: string
        description: "Build run ID from the build workflow."
        required: true
      ref_slug:
        type: string
        description: "Source ref slug from the build workflow."
        required: false
      test_pattern:
        type: string
        description: "Run tests which names match this pattern (also flaky)"
        default: ""
        required: false
    secrets:
      ARTIFACTS_DOWNLOADER_APP_ID:
        required: false
      ARTIFACTS_DOWNLOADER_PRIVATE_KEY:
        required: false
  workflow_dispatch:
    inputs:
      test_pattern:
        type: string
        description: "Run tests which names match this pattern (also flaky)"
        default: ""
        required: false

concurrency:
  group: cumulus-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

permissions: read-all

env:
  FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR: 1
  LOCAL_DIR: "./cumulus/zombienet/tests"
  GHA_CLUSTER_SERVER_ADDR: "https://kubernetes.default:443"
  # use spot by default
  X_INFRA_INSTANCE: "spot"
  # don't retry sdk tests
  NEXTEST_RETRIES: 0
  KUBECONFIG: "/data/config"
  ZOMBIE_CLEANER_DISABLED: 1

# only run if we have changes in [subtrate, cumulus, polkadot] directories or this workflow.
jobs:
  isdraft:
    uses: ./.github/workflows/reusable-isdraft.yml
  preflight:
    needs: isdraft
    uses: ./.github/workflows/zombienet-reusable-preflight.yml
    with:
      tests_yaml: .github/zombienet-tests/zombienet_cumulus_tests.yml
      test_pattern: ${{ inputs.test_pattern }}
      build_run_id: ${{ inputs.build_run_id }}
      ref_slug: ${{ inputs.ref_slug }}

  zombienet-cumulus-tests:
    name: ${{ matrix.test.job-name }}
    runs-on: ${{ matrix.test.runner-type == 'default' && needs.preflight.outputs.ZOMBIENET_SDK_DEFAULT_RUNNER || needs.preflight.outputs.ZOMBIENET_SDK_LARGE_RUNNER }}
    timeout-minutes: 70 # 60 for test + 10 for send logs
    needs: [preflight]
    # Run if: called from build workflow OR merge_group OR (changes detected)
    if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group' || (needs.preflight.outputs.changes_substrate == 'true' || needs.preflight.outputs.changes_cumulus == 'true' || needs.preflight.outputs.changes_polkadot == 'true' || needs.preflight.outputs.changes_zombienet == 'true') }}
    container:
      image: ${{ needs.preflight.outputs.ZOMBIENET_SDK_IMAGE }}
      options: -v /var/log/shared/zombienet:/var/log/shared/zombienet
    env:
      POLKADOT_IMAGE: "${{ needs.preflight.outputs.TEMP_IMAGES_BASE }}/polkadot-debug:${{ needs.preflight.outputs.DOCKER_IMAGES_VERSION }}"
      CUMULUS_IMAGE: "${{ needs.preflight.outputs.TEMP_IMAGES_BASE }}/${{ matrix.test.cumulus-image }}:${{ needs.preflight.outputs.DOCKER_IMAGES_VERSION }}"
      RUST_LOG: ${{ needs.preflight.outputs.RUST_LOG }}
      ZOMBIE_PROVIDER: ${{ needs.preflight.outputs.ZOMBIE_PROVIDER }}

    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.preflight.outputs.TEST_MATRIX) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate App token for artifact downloads
        id: artifact_token
        if: ${{ matrix.test.needs-wasm-binary }}
        shell: bash
        run: |
          if [[ -n "${{ secrets.ARTIFACTS_DOWNLOADER_APP_ID }}" ]]; then
            echo "use_app_token=true" >> $GITHUB_OUTPUT
          else
            echo "use_app_token=false" >> $GITHUB_OUTPUT
          fi

      - name: Create App installation token
        id: app_token
        if: ${{ matrix.test.needs-wasm-binary && steps.artifact_token.outputs.use_app_token == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.ARTIFACTS_DOWNLOADER_APP_ID }}
          private-key: ${{ secrets.ARTIFACTS_DOWNLOADER_PRIVATE_KEY }}

      - name: Download test parachain artifact
        if: ${{ matrix.test.needs-wasm-binary }}
        uses: ./.github/actions/download-artifact-extract
        with:
          artifact-name: build-test-parachain-${{ needs.preflight.outputs.SOURCE_REF_SLUG }}
          gh-token: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.preflight.outputs.BUILD_RUN_ID }}

      - name: zombienet_test
        timeout-minutes: 60
        uses: ./.github/actions/zombienet-sdk
        with:
          test-filter: ${{ matrix.test.test-filter }}
          job-name: ${{ matrix.test.job-name }}
          prefix: "cumulus"
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          build-id: ${{ needs.preflight.outputs.BUILD_RUN_ID }}
          ref-slug: ${{ needs.preflight.outputs.SOURCE_REF_SLUG }}
          app-id: ${{ secrets.ARTIFACTS_DOWNLOADER_APP_ID }}
          app-private-key: ${{ secrets.ARTIFACTS_DOWNLOADER_PRIVATE_KEY }}

      - name: process_logs
        if: ${{ always() }}
        shell: bash
        run: |
          echo "Processing log files"
          echo "::group::Logs"
          # do not fail the whole run if this step fails
          if ! ./.github/scripts/process-logs-zombienet.sh ; then
            echo "::endgroup::"
            echo "::warning ::WARNING: Failed to process logs"
          else
            echo "::endgroup::"
          fi

      - name: upload_logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: zombienet-logs-${{ matrix.test.job-name }}-${{ github.sha }}
          path: |
            /tmp/zombie*/logs/*
